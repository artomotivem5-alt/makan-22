<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    MAKAN Wordmark — Faithful reproduction of original brand.
    All arch letters (A, N) use same 30px radius as M arches.
    Only the N has a dot inside (location pin).
    No trailing dot.
  -->

  <!-- M — two connected arches (each 60px wide, radius 30) -->
  <g>
    <path d="M4,90 L4,40 A30,30 0 0 1 64,40 L64,90"/>
    <path d="M64,90 L64,40 A30,30 0 0 1 124,40 L124,90"/>
  </g>

  <!-- A — arch with horizontal crossbar from right leg -->
  <g transform="translate(140,0)">
    <path d="M4,90 L4,40 A30,30 0 0 1 64,40 L64,90"/>
    <line x1="30" y1="65" x2="64" y2="65"/>
  </g>

  <!-- K — vertical stem with diagonal arms -->
  <g transform="translate(218,0)">
    <line x1="4" y1="10" x2="4" y2="90"/>
    <path d="M4,54 L48,10"/>
    <path d="M4,54 L50,90"/>
  </g>

  <!-- A — arch with horizontal crossbar from right leg -->
  <g transform="translate(282,0)">
    <path d="M4,90 L4,40 A30,30 0 0 1 64,40 L64,90"/>
    <line x1="30" y1="65" x2="64" y2="65"/>
  </g>

  <!-- N — LOCATION PIN: same arch as A + centered dot inside -->
  <g transform="translate(362,0)">
    <path d="M4,90 L4,40 A30,30 0 0 1 64,40 L64,90"/>
    <circle cx="34" cy="50" r="5" fill="white" stroke="none"/>
  </g>

</svg>
